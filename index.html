<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Cuaca Raditya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cek Cuaca</h1>

        <div id="weather-result">

            <p id="temp">- °C</p>
            <p id="description">-</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
